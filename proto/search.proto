syntax = "proto3";

package search.ipc;

service SearchService {
  rpc Ping (PingReq) returns (PingResp);
  rpc BuildIndex (BuildIndexReq) returns (BuildIndexResp);
  rpc Search (SearchReq) returns (SearchResp);
  rpc StartUsnMonitoring (StartUsnMonitoringReq) returns (StartUsnMonitoringResp);
  rpc StopUsnMonitoring (StopUsnMonitoringReq) returns (StopUsnMonitoringResp);
}

message PingReq {}

message PingResp {
  string version = 1;
}

message BuildIndexReq {
  repeated string roots = 1;
}

message BuildIndexResp {
  bool success = 1;
  uint64 indexed_files = 2;
}

message SearchReq {
  string keyword = 1;
  uint32 limit = 2;
}

message SearchResp {
  repeated SearchResult results = 1;
}

message SearchResult {
  string path = 1;
  string filename = 2;
}

message StartUsnMonitoringReq {
  string drive_letter = 1;  // e.g., "C", "D"
}

message StartUsnMonitoringResp {
  bool success = 1;
  string message = 2;
}

message StopUsnMonitoringReq {}

message StopUsnMonitoringResp {
  bool success = 1;
  string message = 2;
}
